<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/dashboard.css" />
    <link rel="stylesheet" href="../../css/feed.css" />
    <link rel="stylesheet" href="../../css/animations.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>Student Hub</h2>
        <nav>
          <a class="active" href="dashboard.html">Dashboard</a>
          <a href="create-post.html">Create Post</a>
          <a href="my-posts.html">My Posts</a>
          <a href="leaderboard.html">Leaderboard</a>
          <a href="achievements.html">Achievements</a>
          <a href="communities.html">Communities</a>
          <a href="profile.html">Profile</a>
        </nav>
        <button class="btn btn-outline" onclick="toggleTheme()">
          Toggle Theme
        </button>
      </aside>
      <main class="main">
        <div class="stats">
          <div class="card">
            <h3 class="card-title">Approved Posts</h3>
            <p>12</p>
          </div>
          <div class="card">
            <h3 class="card-title">Avg Score</h3>
            <p>88</p>
          </div>
          <div class="card">
            <h3 class="card-title">Rank</h3>
            <p>#6</p>
          </div>
        </div>
        <section>
          <h2 style="font-family: var(--font-serif); margin-bottom: 16px">
            Latest Approvals
          </h2>
          <div id="feed" class="grid"></div>
        </section>
      </main>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/student/dashboard.js"></script>
  </body>
</html>
