<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/dashboard.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>Teacher Console</h2>
        <nav>
          <a class="active" href="dashboard.html">Dashboard</a>
          <a href="pending.html">Pending</a>
          <a href="approved.html">Approved</a>
          <a href="rejected.html">Rejected</a>
          <a href="analytics.html">Analytics</a>
          <a href="leaderboard.html">Leaderboard</a>
        </nav>
      </aside>
      <main class="main">
        <div class="stats">
          <div class="card">
            <h3 class="card-title">Total Posts</h3>
            <p id="totalPosts">0</p>
          </div>
          <div class="card">
            <h3 class="card-title">Pending</h3>
            <p id="pendingPosts">0</p>
          </div>
          <div class="card">
            <h3 class="card-title">Avg Score</h3>
            <p id="avgScore">0</p>
          </div>
        </div>
        <div class="card">
          <h3 class="card-title">Quick Actions</h3>
          <p>Review pending submissions and share insights with students.</p>
        </div>
      </main>
    </div>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/teacher/dashboard.js"></script>
  </body>
</html>
