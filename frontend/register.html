<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusConnect | Register</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card glass">
        <h1>Create your profile</h1>
        <div class="input">
          <label>Name</label>
          <input id="name" type="text" placeholder="Full name" />
        </div>
        <div class="input">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@campus.edu" />
        </div>
        <div class="input">
          <label>Password</label>
          <input id="password" type="password" placeholder="********" />
        </div>
        <div class="input">
          <label>Department</label>
          <input id="department" type="text" placeholder="CSE" />
        </div>
        <div class="input">
          <label>Roll Number</label>
          <input id="roll" type="text" placeholder="CSE2023-001" />
        </div>
        <div class="input">
          <label>Year</label>
          <input id="year" type="number" min="1" max="4" placeholder="4" />
        </div>
        <div style="display: flex; gap: 12px">
          <button class="btn btn-primary" onclick="register('student')">
            Register Student
          </button>
          <button class="btn btn-outline" onclick="register('teacher')">
            Register Teacher
          </button>
        </div>
        <a href="login.html" style="color: var(--muted)"
          >Already have an account? Login</a
        >
      </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
  </body>
</html>
