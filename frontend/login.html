<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusConnect | Login</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card glass">
        <h1>Welcome back</h1>
        <div class="input">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@campus.edu" />
        </div>
        <div class="input">
          <label>Password</label>
          <input id="password" type="password" placeholder="********" />
        </div>
        <div style="display: flex; gap: 12px">
          <button class="btn btn-primary" onclick="login('student')">
            Student Login
          </button>
          <button class="btn btn-outline" onclick="login('teacher')">
            Teacher Login
          </button>
        </div>
        <a href="register.html" style="color: var(--muted)"
          >Need an account? Register</a
        >
      </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
  </body>
</html>
